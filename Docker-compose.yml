version: "3.8"

services:
  app:
    image: rajshreec/train-app:${IMAGE_TAG}
    container_name: train-app
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
